<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransferCircle - Sign Up</title>
    <link rel="icon" type="image/png" href="../Image/Green Organic Illustrative Zero Waste Recycle logo 1.png">
    <link rel="stylesheet" href="SignUp.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-text">
        <span class="left-text">Transfer</span>
        <span class="right-text">Circle</span>
    </div>
    <div class="container">
        <div class="form-box">
            <h2>Create Account</h2>
            <form action="#">
                <div class="input-box">
                    <input type="text" id="fullname" required placeholder=" ">
                    <label for="fullname">Full Name</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Email Address</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="confirm-password" required placeholder=" ">
                    <label for="confirm-password">Confirm Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
                </div>
                <button class="btn" type="submit">Sign Up</button>
                <div class="regi-link">
                    <p>Already have an account? <a href="../Login/Login.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="SignUp.js"></script>
</body>

</html>
