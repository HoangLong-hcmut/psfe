<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TransferCircle</title>
    <link rel="icon" type="image/png" href="../Image/Green Organic Illustrative Zero Waste Recycle logo 1.png">
    <link rel="stylesheet" href="Login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="login-page">
        <header class="header">
            <div class="logo">
                <span>TransferCircle</span>
            </div>
            <div class="menu-btn">
                <i class='bx bx-menu'></i>
            </div>
            <nav class="navbar">
                <a href="../index.html"><i class='bx bx-home'></i>Home</a>
                <a href="../Trade/Trade.html"><i class='bx bx-transfer'></i>Trade</a>
                <a href="../Contact/Contact.html"><i class='bx bx-envelope'></i>Contact</a>
                <a href="../Profile/Profile.html"><i class='bx bx-user'></i>Profile</a>
                <a href="Login.html"><i class='bx bx-user-plus'></i>Login</a>
            </nav>
        </header>
    </div>
    <div class="container">
        <div class="form-box">
            <h2>Welcome Back</h2>
            <form action="#">
                <div class="input-box">
                    <input type="text" id="username" required placeholder=" ">
                    <label for="username">Email Address</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button class="btn" type="submit">Login</button>
                <div class="regi-link">
                    <p>Don't have an account? <a href="../SignUp/SignUp.html">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="info-content">
            <h2>
                <div class="typing-line">
                    <span class="typing-text-left">TRANSFER</span>
                </div>
                <div class="typing-line">
                    <span class="typing-text-right">CIRCLE</span>
                </div>
            </h2>
            <p>
                <span>Connect</span>
                <span>with</span>
                <span>our</span>
                <span>community</span>
                <span>to</span>
                <span>promote</span>
                <span>sustainability</span>
                <span>and</span>
                <span>circular</span>
                <span>economy</span>
                <span>initiatives.</span>
            </p>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="Login.js"></script>
</body>

</html>
